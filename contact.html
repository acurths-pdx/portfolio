<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Alicia Curths</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-light">
    <header class="site-header container-fluid p-3 d-flex">
      <nav class="navbar navbar-expand-md w-100">
        <a
          class="text-light fs-2 fw-semibold m-0 text-decoration-none"
          href="index.html"
          >Alicia Curths</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
          aria-controls="navMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link text-light fw-medium" href="index.html#about"
                >About</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link text-light fw-medium"
                href="index.html#experience"
                >Experience</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link text-light fw-medium"
                href="index.html#projects"
                >Projects</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link text-light fw-medium active"
                aria-current="page"
                href="contact.html"
                >Contact</a
              >
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <main class="container py-4">
      <section id="contact" class="py-4">
        <h1 class="section-title">Contact</h1>
        <div class="card shadow-lg contact-page-card">
          <div class="row g-0">
            <div class="col-md-5">
              <img
                src="images/contact2.jpg"
                alt=""
                class="contact-page-img rounded-start"
              />
            </div>
            <div class="col-md-7 p-4 p-md-5">
              <h2 class="contact-heading mb-2">Get in Touch</h2>
              <p class="mb-4">
                Have a question or want to work together? Fill out the form
                below and I'll get back to you soon.
              </p>
              <form class="contact-form">
                <div class="mb-3">
                  <label for="name" class="form-label">Name</label>
                  <input
                    type="text"
                    class="form-control"
                    id="name"
                    name="name"
                    placeholder="Your name"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    placeholder="your@email.com"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="message" class="form-label">Message</label>
                  <textarea
                    class="form-control"
                    id="message"
                    name="message"
                    rows="5"
                    placeholder="What's on your mind?"
                    required
                  ></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  Send Message
                </button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer container-fluid py-3 text-center">
      <p>Alicia Curths - Portfolio (2026)</p>
    </footer>
    <button
      class="back-to-top"
      id="back-to-top"
      aria-label="Back to top"
      title="Back to top"
    >
      ↑
    </button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
  </body>
</html>
